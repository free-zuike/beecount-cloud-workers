name: 部署到 Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: '环境'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      id-token: write
    env:
      CLOUDFLARE_D1_DATABASE_ID: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 类型检查
        run: npx tsc --noEmit

      - name: 运行测试
        run: npm test || true

      - name: 创建 D1 数据库（如果不存在）
        run: |
          npx wrangler d1 create beecount-cloud 2>/dev/null || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 获取 D1 数据库 ID
        id: get-db-id
        run: |
          DB_ID=$(npx wrangler d1 list --json | jq -r '.[] | select(.name == "beecount-cloud") | .id')
          echo "db_id=$DB_ID" >> $GITHUB_OUTPUT
          echo "CLOUDFLARE_D1_DATABASE_ID=$DB_ID" >> $GITHUB_ENV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 推送 Schema 到 D1
        run: |
          npx wrangler d1 execute beecount-cloud --file=./schema.sql --remote --yes
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: 部署到 Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env=production
          wranglerVersion: '3'
        env:
          CLOUDFLARE_D1_DATABASE_ID: ${{ steps.get-db-id.outputs.db_id }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  deploy-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      deployments: write
      id-token: write

    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 部署预览环境
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env=preview --dry-run
          wranglerVersion: '3'