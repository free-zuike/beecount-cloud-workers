name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: npm install

      - name: Setup D1 database
        id: d1
        run: |
          # List databases and find beecount-cloud
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              for db in data:
                  if db.get('name') == 'beecount-cloud':
                      print(db['uuid'])
                      break
          except: pass
          ")

          if [ -z "$DB_ID" ]; then
            echo "Creating new D1 database..."
            npx wrangler d1 create beecount-cloud > create_out.txt 2>&1 || true
            DB_ID=$(python3 -c "
          import re
          try:
              with open('create_out.txt') as f:
                  content = f.read()
              m = re.search(r'[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}', content)
              if m: print(m.group())
          except: pass
          ")
          fi

          if [ -z "$DB_ID" ]; then
            echo "FATAL: Could not resolve database_id"
            exit 1
          fi

          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Patch wrangler.toml
        run: |
          DB_ID="${{ steps.d1.outputs.database_id }}"
          echo "Patching database_id to: $DB_ID"
          sed -i "s|database_id = \"[^\"]*\"|database_id = \"$DB_ID\"|" wrangler.toml
          grep "database_id" wrangler.toml

      - name: Apply migrations
        run: npx wrangler d1 migrations apply beecount-cloud --remote

      - name: Build frontend
        run: cd frontend && pnpm install --no-frozen-lockfile && pnpm build

      - name: Deploy
        run: npx wrangler deploy
