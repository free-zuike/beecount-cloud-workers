name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: npm install

      - name: Setup D1 database
        id: d1
        run: |
          DB_ID="2ee426d6-4813-4f6a-8ead-8feabc0236fe"
          echo "Using existing D1 database: $DB_ID"
          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Patch wrangler.toml
        run: |
          DB_ID="${{ steps.d1.outputs.database_id }}"
          echo "Patching database_id to: $DB_ID"
          sed -i "s|database_id = \"[^\"]*\"|database_id = \"$DB_ID\"|" wrangler.toml
          grep "database_id" wrangler.toml

      - name: Build frontend
        run: cd frontend && pnpm install --no-frozen-lockfile && pnpm build

      - name: Deploy
        run: npx wrangler deploy
