name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: npm install

      - name: Setup D1 database
        id: d1
        run: |
          # List existing databases
          LIST=$(npx wrangler d1 list 2>&1)
          echo "$LIST"
          DB_ID=$(echo "$LIST" | grep 'beecount-cloud' | head -1 | awk '{print $1}')

          if [ -z "$DB_ID" ]; then
            echo "Database not found, creating..."
            CREATE_OUTPUT=$(npx wrangler d1 create beecount-cloud 2>&1)
            echo "$CREATE_OUTPUT"
            DB_ID=$(echo "$CREATE_OUTPUT" | sed -n 's/.*database_id.*"\([^"]*\)".*/\1/p')
          fi

          echo "Resolved database_id: [$DB_ID]"
          if [ -z "$DB_ID" ]; then
            echo "ERROR: Could not resolve database_id"
            exit 1
          fi
          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Update wrangler.toml
        run: |
          sed -i 's/database_id = ".*"/database_id = "'"${{ steps.d1.outputs.database_id }}"'"/' wrangler.toml
          echo "Updated wrangler.toml:"
          grep database_id wrangler.toml

      - name: Apply migrations
        run: npx wrangler d1 migrations apply beecount-cloud --remote

      - name: Build frontend
        run: cd frontend && pnpm install --no-frozen-lockfile && pnpm build

      - name: Deploy
        run: npx wrangler deploy
