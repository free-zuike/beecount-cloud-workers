name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: npm install

      - name: Setup D1 database
        id: d1
        run: |
          # List databases as JSON and parse
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          for db in data:
              if db.get('name') == 'beecount-cloud':
                  print(db['uuid'])
                  break
          " 2>/dev/null)

          if [ -z "$DB_ID" ]; then
            echo "Database not found, creating..."
            npx wrangler d1 create beecount-cloud 2>&1 | tee create_out.txt
            DB_ID=$(python3 -c "
          import re
          with open('create_out.txt') as f:
              content = f.read()
          m = re.search(r'[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}', content)
              if m: print(m.group())
          ")
          fi

          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT
          echo "DB_ID=$DB_ID"

      - name: Update wrangler.toml
        run: |
          DB_ID="${{ steps.d1.outputs.database_id }}"
          if [ -z "$DB_ID" ]; then
            echo "ERROR: database_id is empty!"
            exit 1
          fi
          # Use python for reliable string replacement
          python3 -c "
          import re
          with open('wrangler.toml', 'r') as f:
              content = f.read()
          content = re.sub(r'database_id = \"[^\"]*\"', f'database_id = \"{DB_ID}\"', content, count=1)
          with open('wrangler.toml', 'w') as f:
              f.write(content)
          "
          echo "Updated wrangler.toml:"
          grep database_id wrangler.toml

      - name: Apply migrations
        run: npx wrangler d1 migrations apply beecount-cloud --remote

      - name: Build frontend
        run: cd frontend && pnpm install --no-frozen-lockfile && pnpm build

      - name: Deploy
        run: npx wrangler deploy
