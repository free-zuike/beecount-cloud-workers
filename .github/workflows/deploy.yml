name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: npm install

      - name: Setup D1 database
        id: d1
        run: |
          DB_ID=""

          # 用 JSON 格式查找现有数据库，避免 grep 解析问题
          DB_ID=$(npx wrangler d1 list --json 2>/dev/null | node -e "
            const data = JSON.parse(require('fs').readFileSync(0, 'utf8'));
            const db = data.find(d => d.name === 'beecount-cloud');
            if (db) process.stdout.write(db.uuid);
          " || true)

          if [ -z "$DB_ID" ]; then
            echo "No existing database found, creating new one..."
            npx wrangler d1 create beecount-cloud 2>&1 | tee create_out.txt || true
            DB_ID=$(grep -oP '[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}' create_out.txt 2>/dev/null || true)
          fi

          if [ -z "$DB_ID" ]; then
            echo "FATAL: Could not resolve database_id"
            exit 1
          fi

          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT
          echo "Resolved D1 database_id: $DB_ID"

      - name: Patch wrangler.toml
        run: |
          DB_ID="${{ steps.d1.outputs.database_id }}"
          echo "Patching database_id to: $DB_ID"
          sed -i "s|database_id = \"[^\"]*\"|database_id = \"$DB_ID\"|" wrangler.toml
          grep "database_id" wrangler.toml

      - name: Build frontend
        run: cd frontend && VITE_APP_VERSION=1.5.2 pnpm install --no-frozen-lockfile && VITE_APP_VERSION=1.5.2 pnpm build
        env:
          VITE_APP_VERSION: "1.5.2"

      - name: Deploy
        run: npx wrangler deploy
