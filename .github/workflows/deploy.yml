name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install root dependencies
        run: npm install

      - name: Create or get D1 database
        id: d1
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DB_LIST=$(npx wrangler d1 list 2>/dev/null)
          DB_ID=$(echo "$DB_LIST" | grep 'beecount-cloud' | awk '{print $1}')
          
          if [ -z "$DB_ID" ]; then
            npx wrangler d1 create beecount-cloud
            DB_ID=$(npx wrangler d1 list 2>/dev/null | grep 'beecount-cloud' | awk '{print $1}')
          fi
          
          echo "database_id=$DB_ID" >> $GITHUB_OUTPUT

      - name: Patch wrangler.toml
        run: sed -i "s/database_id = \"[^\"]*\"/database_id = \"${{ steps.d1.outputs.database_id }}\"/" wrangler.toml

      - name: Apply schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply beecount-cloud --remote

      - name: Build frontend
        run: cd frontend && pnpm install --no-frozen-lockfile && pnpm build

      - name: Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy
