name: Sync Upstream

on:
  schedule:
    # 每天 UTC 02:00 检查更新
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Sync with upstream
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/TNT-Likely/BeeCount-Cloud.git || true
          git fetch upstream main

      - name: Check for updates
        id: check
        run: |
          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "status=up-to-date" >> $GITHUB_OUTPUT
            echo "No updates from upstream"
          else
            echo "status=behind" >> $GITHUB_OUTPUT
            echo "Upstream has new commits"
            git log --oneline HEAD..upstream/main | head -10
          fi

      - name: Merge upstream changes
        if: steps.check.outputs.status == 'behind'
        run: |
          git merge upstream/main --no-edit -m "chore: sync with upstream BeeCount-Cloud"
          
      - name: Apply R2 frontend patches
        if: steps.check.outputs.status == 'behind'
        run: |
          # 检查是否有 R2 相关的前端修改被覆盖
          if ! grep -q "r2" frontend/packages/web-features/src/features/BackupRemotesPanel.tsx 2>/dev/null; then
            echo "R2 patches may need re-application"
            # 这里可以添加自动应用补丁的逻辑
          fi

      - name: Build frontend
        if: steps.check.outputs.status == 'behind'
        run: cd frontend && pnpm install --no-frozen-lockfile && pnpm build

      - name: Deploy
        if: steps.check.outputs.status == 'behind'
        run: npx wrangler deploy

      - name: Commit and push
        if: steps.check.outputs.status == 'behind'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: sync with upstream + rebuild" || true
          git push origin main
