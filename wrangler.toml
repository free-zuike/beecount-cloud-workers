name = "beecount-cloud-workers"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 定时任务触发器 - 每5分钟检查一次
[triggers]
crons = ["*/5 * * * *"]

[alias]
tslib = "tslib"

[[d1_databases]]
binding = "DB"
database_name = "beecount-cloud"
  database_id = "15d7d97d-0ba1-4a72-963f-a1b649b48042"

[[durable_objects.bindings]]
name = "BEECOUNT_DO"
class_name = "BeeCountDO"

[[r2_buckets]]
binding = "R2"
bucket_name = "beecount-storage"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["BeeCountDO"]

[vars]
API_PREFIX = "/api/v1"
# JWT_SECRET 通过 Cloudflare Dashboard → Workers → Settings → Variables and Secrets 设置
# 或 CLI: npx wrangler secret put JWT_SECRET

[observability]
enabled = true

# 自动构建前端 (CI/CD 中使用)
# [build]
# command = "cd frontend && VITE_APP_VERSION=1.0.0 pnpm install --no-frozen-lockfile && VITE_APP_VERSION=1.0.0 pnpm build"

# 静态资产配置 - 官方前端构建输出在 apps/web/dist
[assets]
directory = "./frontend/apps/web/dist"
binding = "ASSETS"
