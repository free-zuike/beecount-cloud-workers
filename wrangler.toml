name = "beecount-cloud-workers"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 定时任务触发器 - 每5分钟检查一次
[triggers]
crons = ["*/5 * * * *"]

[alias]
tslib = "tslib"

[[d1_databases]]
binding = "DB"
database_name = "beecount-cloud"
database_id = "07fbada6-fe06-4c09-98b3-d28557d9876a"

[[durable_objects.bindings]]
name = "BEECOUNT_DO"
class_name = "BeeCountDO"

[[migrations]]
tag = "v3"
new_sqlite_classes = ["BeeCountDO"]

[vars]
API_PREFIX = "/api/v1"
# JWT_SECRET 通过 Cloudflare Dashboard → Workers → Settings → Variables and Secrets 设置
# 或 CLI: npx wrangler secret put JWT_SECRET

[observability]
enabled = true

# 自动构建前端 (使用 pnpm，禁用 frozen-lockfile)
[build]
command = "cd frontend && pnpm install --no-frozen-lockfile && pnpm build"

# 静态资产配置 - 官方前端构建输出在 apps/web/dist
[assets]
directory = "./frontend/apps/web/dist"
binding = "ASSETS"
