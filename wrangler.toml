name = "beecount-cloud-workers"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 定时任务触发器 - 每5分钟检查一次
[triggers]
crons = ["*/5 * * * *"]

[alias]
tslib = "tslib"

[[d1_databases]]
binding = "DB"
database_name = "beecount-cloud"
database_id = "c6e91823-3c1d-4d00-9fc7-e383843f1a96"

[[durable_objects.bindings]]
name = "BEECOUNT_DO"
class_name = "BeeCountDO"

[[migrations]]
tag = "v3"
new_classes = ["BeeCountDO"]

[vars]
API_PREFIX = "/api/v1"
# JWT_SECRET 已迁移到 Cloudflare Secrets，通过以下命令设置：
# npx wrangler secret put JWT_SECRET

[observability]
enabled = true

# 自动构建前端 (使用 pnpm，禁用 frozen-lockfile)
[build]
command = "cd frontend && pnpm install --no-frozen-lockfile && pnpm build"

# 静态资产配置 - 官方前端构建输出在 apps/web/dist
[assets]
directory = "./frontend/apps/web/dist"
binding = "ASSETS"
