name = "beecount-cloud-workers"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[alias]
tslib = "tslib"

[[d1_databases]]
binding = "DB"
database_name = "beecount-cloud"
database_id = "b0da0464-f186-4114-a291-9dd7d0b7a1d5"

[vars]
API_PREFIX = "/api/v1"
JWT_SECRET = "YBt6MxIcvuWIA3kE/MPHuWPCFEcaCBPB80YxZM5hBaw="

[observability]
enabled = true

# 自动构建前端 (使用 pnpm)
[build]
command = "cd frontend && pnpm install && pnpm build"

# 静态资产配置 - 官方前端构建输出在 apps/web/dist
[assets]
directory = "./frontend/apps/web/dist"
binding = "ASSETS"
