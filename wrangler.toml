name = "beecount-cloud-workers"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 定时任务触发器 - 每5分钟检查一次
[triggers]
crons = ["*/5 * * * *"]

[alias]
tslib = "tslib"

[[d1_databases]]
binding = "DB"
database_name = "beecount-cloud"
database_id = "b3d0a7b6-57ad-4dc0-9445-6805efe88b0d"

[vars]
API_PREFIX = "/api/v1"
JWT_SECRET = "YBt6MxIcvuWIA3kE/MPHuWPCFEcaCBPB80YxZM5hBaw="

[observability]
enabled = true

# 自动构建前端 (使用 pnpm，禁用 frozen-lockfile)
[build]
command = "cd frontend && pnpm install --no-frozen-lockfile && pnpm build"

# 静态资产配置 - 官方前端构建输出在 apps/web/dist
[assets]
directory = "./frontend/apps/web/dist"
binding = "ASSETS"
