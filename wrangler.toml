name = "beecount-cloud-workers"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 定时任务触发器 - 每5分钟检查一次
[triggers]
crons = ["*/5 * * * *"]

[alias]
tslib = "tslib"

[[d1_databases]]
binding = "DB"
database_name = "beecount-cloud"
database_id = "7ade7fef-3c80-4a1d-a576-1b25eda102dd"

[[durable_objects.bindings]]
name = "WS_SESSION"
class_name = "WsSession"

[[durable_objects.bindings]]
name = "LOG_BUFFER"
class_name = "LogBuffer"

[[durable_objects.bindings]]
name = "TASK_LOCK"
class_name = "TaskLock"

[[migrations]]
tag = "v1"
new_classes = ["WsSession", "LogBuffer", "TaskLock"]

[vars]
API_PREFIX = "/api/v1"
# JWT_SECRET 已迁移到 Cloudflare Secrets，通过以下命令设置：
# npx wrangler secret put JWT_SECRET

[observability]
enabled = true

# 自动构建前端 (使用 pnpm，禁用 frozen-lockfile)
[build]
command = "cd frontend && pnpm install --no-frozen-lockfile && pnpm build"

# 静态资产配置 - 官方前端构建输出在 apps/web/dist
[assets]
directory = "./frontend/apps/web/dist"
binding = "ASSETS"
